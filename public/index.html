<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>승부식 경기 분석기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif; background: #f5f5f0; color: #1a1a1a; font-size: 14px; }

  @media (max-width: 600px) {
    header { padding: 0.7rem 1rem; }
    header h1 { font-size: 14px; white-space: nowrap; }
    .badge { font-size: 10px; padding: 2px 6px; white-space: nowrap; }
    .container { padding: 0.8rem; padding-bottom: 100px; }
    .controls { gap: 6px; }
    .filter-btn { font-size: 12px; padding: 5px 10px; }
    select { font-size: 12px; padding: 5px 8px; }
    .reload-btn { font-size: 12px; padding: 5px 10px; }
    .stats { gap: 6px; }
    .stat { padding: 0.7rem 0.8rem; }
    .stat-label { font-size: 11px; }
    .stat-value { font-size: 18px; }
    .game-card { padding: 0.8rem; }
    .team-name { font-size: 13px; }
    .win-rate { font-size: 12px; }
    .odd { padding: 6px 4px; }
    .odd-value { font-size: 14px; }
    .odd-label { font-size: 9px; }
    .wr-range { gap: 5px; font-size: 12px; }
    .wr-range input[type=range] { width: 70px; }
    .wr-range span { min-width: 24px; font-size: 11px; }
    .game-time { font-size: 11px; }
    .league { font-size: 11px; }
    .sport-tag { font-size: 10px; }
    .ai-status { font-size: 12px; padding: 0.6rem 0.8rem; }
    .combo-panel { padding: 0.6rem 1rem; }
    .combo-result { font-size: 18px; }
    .combo-item { font-size: 11px; }
  }

  header { background: #fff; border-bottom: 1px solid #e8e8e4; padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 18px; font-weight: 600; }
  .badge { font-size: 12px; padding: 3px 10px; border-radius: 20px; background: #e8f4ee; color: #1a7a47; font-weight: 500; }
  .badge.loading { background: #fef3e2; color: #8a4f00; }

  .container { max-width: 900px; margin: 0 auto; padding: 1.5rem; padding-bottom: 100px; }

  .controls { display: flex; gap: 8px; margin-bottom: 1.2rem; flex-wrap: wrap; align-items: center; }
  select { font-size: 13px; padding: 6px 14px; border-radius: 8px; border: 1px solid #ddd; background: #fff; cursor: pointer; }
  .filter-btn { font-size: 13px; padding: 6px 14px; border-radius: 8px; border: 1px solid #ddd; background: #fff; cursor: pointer; }
  .filter-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .filter-btn:hover:not(.active) { background: #f0f0ec; }
  .reload-btn { margin-left: auto; font-size: 13px; padding: 6px 14px; border-radius: 8px; border: 1px solid #ddd; background: #fff; cursor: pointer; }
  .reload-btn:hover { background: #f0f0ec; }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .stat { background: #fff; border-radius: 10px; padding: 1rem 1.2rem; border: 1px solid #e8e8e4; }
  .stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
  .stat-value { font-size: 24px; font-weight: 600; }
  .stat-value.green { color: #1a7a47; }

  .ai-status { background: #fff; border: 1px solid #e8e8e4; border-radius: 10px; padding: 0.8rem 1.2rem; margin-bottom: 1.2rem; font-size: 13px; color: #888; display: flex; align-items: center; gap: 8px; }
  .ai-status.done { color: #1a7a47; }
  .ai-status.error { color: #e53935; }

  .game-list { display: flex; flex-direction: column; gap: 8px; }
  .game-card { background: #fff; border-radius: 12px; padding: 1rem 1.2rem; border: 1px solid #e8e8e4; border-left: 3px solid #1a7a47; }

  .game-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .sport-tag { font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 600; }
  .sport-bs { background: #fef3e2; color: #8a4f00; }
  .sport-sc { background: #e8f5e9; color: #1b5e20; }
  .sport-bk { background: #ede7f6; color: #311b92; }
  .sport-vl { background: #fce4ec; color: #880e4f; }
  .game-time { font-size: 12px; color: #888; }
  .league { font-size: 12px; color: #aaa; margin-left: auto; }

  .matchup { display: grid; grid-template-columns: 1fr 40px 1fr; gap: 8px; align-items: center; margin-bottom: 10px; }
  .team-away { text-align: right; }
  .team-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .win-rate { font-size: 13px; color: #888; }
  .win-rate.high { color: #1a7a47; font-weight: 600; }
  .win-rate.loading { color: #ccc; }
  .wr-bar { height: 4px; border-radius: 2px; background: #eee; margin-top: 3px; overflow: hidden; }
  .wr-fill { height: 100%; border-radius: 2px; background: #ccc; transition: width 0.8s ease; }
  .wr-fill.high { background: #1a7a47; }
  .team-away .wr-bar { direction: rtl; }
  .vs { text-align: center; font-size: 11px; color: #ccc; font-weight: 600; }

  .odds { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; border-top: 1px solid #f0f0ec; padding-top: 10px; }
  .odd { text-align: center; padding: 8px 6px; border-radius: 8px; background: #f8f8f6; cursor: pointer; transition: all 0.15s; user-select: none; }
  .odd:hover { background: #efefed; }
  .odd.selected { background: #1a1a1a; }
  .odd.selected .odd-label { color: #999; }
  .odd.selected .odd-value { color: #fff; }
  .odd.disabled { cursor: default; opacity: 0.5; }
  .odd-label { font-size: 10px; color: #aaa; margin-bottom: 3px; }
  .odd-value { font-size: 16px; font-weight: 600; color: #1a1a1a; }
  .odd-value.dash { color: #ccc; }

  .loading-wrap { text-align: center; padding: 4rem; color: #888; font-size: 14px; }
  .error-wrap { text-align: center; padding: 3rem; color: #e53935; font-size: 14px; }
  .empty-wrap { text-align: center; padding: 3rem; color: #888; font-size: 14px; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #eee; border-top-color: #888; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
  .spinner-sm { display: inline-block; width: 14px; height: 14px; border: 2px solid #e8e8e4; border-top-color: #888; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .high-tag { font-size: 11px; color: #1a7a47; margin: 0 2px; }
  .wr-range { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #444; }
  .wr-range input[type=range] { width: 90px; accent-color: #1a1a1a; }
  .wr-range span { min-width: 30px; font-weight: 600; }

  /* 조합 패널 */
  .combo-panel { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 2px solid #1a1a1a; padding: 0.8rem 1.5rem; display: none; z-index: 100; box-shadow: 0 -4px 20px rgba(0,0,0,0.1); }
  .combo-panel.show { display: block; }
  .combo-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
  .combo-items { display: flex; gap: 6px; flex: 1; flex-wrap: wrap; }
  .combo-item { font-size: 12px; background: #f5f5f0; padding: 4px 10px; border-radius: 20px; display: flex; align-items: center; gap: 5px; }
  .combo-item strong { color: #1a1a1a; }
  .combo-item button { background: none; border: none; cursor: pointer; color: #aaa; font-size: 15px; line-height: 1; padding: 0 0 0 2px; }
  .combo-result { font-size: 22px; font-weight: 700; white-space: nowrap; }
  .combo-result span { font-size: 12px; color: #888; font-weight: 400; margin-right: 4px; }
  .combo-clear { font-size: 13px; padding: 6px 14px; border-radius: 8px; border: 1px solid #ddd; background: #fff; cursor: pointer; white-space: nowrap; }
  .combo-clear:hover { background: #f0f0ec; }

  /* 상세 전적 팝업 */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.show { display: flex; }
  .modal { background: #fff; border-radius: 16px; width: 100%; max-width: 500px; max-height: 80vh; overflow: hidden; display: flex; flex-direction: column; }
  .modal-header { padding: 1rem 1.2rem; border-bottom: 1px solid #f0f0ec; display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-size: 15px; font-weight: 600; }
  .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #888; line-height: 1; }
  .modal-tabs { display: flex; border-bottom: 1px solid #f0f0ec; }
  .modal-tab { flex: 1; padding: 0.7rem; text-align: center; font-size: 13px; cursor: pointer; color: #888; border-bottom: 2px solid transparent; }
  .modal-tab.active { color: #1a1a1a; font-weight: 600; border-bottom-color: #1a1a1a; }
  .modal-body { padding: 1rem; overflow-y: auto; flex: 1; }
  .record-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1rem; }
  .record-stat { text-align: center; background: #f8f8f6; border-radius: 8px; padding: 0.6rem; }
  .record-stat-label { font-size: 11px; color: #888; margin-bottom: 3px; }
  .record-stat-value { font-size: 18px; font-weight: 600; }
  .record-stat-value.green { color: #1a7a47; }
  .record-list { display: flex; flex-direction: column; gap: 6px; }
  .record-item { display: flex; align-items: center; gap: 8px; font-size: 12px; padding: 6px 8px; border-radius: 8px; background: #f8f8f6; }
  .record-date { color: #aaa; min-width: 60px; }
  .record-league { color: #888; min-width: 50px; font-size: 11px; }
  .record-teams { flex: 1; }
  .record-result { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
  .result-win { background: #e8f4ee; color: #1a7a47; }
  .result-draw { background: #f5f5f0; color: #888; }
  .result-loss { background: #fde8e8; color: #e53935; }
  .record-loading { text-align: center; padding: 2rem; color: #888; font-size: 13px; }
  @media (max-width: 600px) {
    .modal { max-height: 90vh; }
    .record-summary { grid-template-columns: repeat(4, 1fr); gap: 5px; }
    .record-stat-value { font-size: 15px; }
  }
</style>
</head>
<body>

<header>
  <h1>⚽ 승부식 경기 분석기</h1>
  <span class="badge" id="round-badge">로딩중...</span>
</header>

<div class="container">
  <div class="controls">
    <select id="round-sel" onchange="loadData()"><option>로딩중...</option></select>
    <button class="filter-btn active" onclick="setFilter('all',this)">전체</button>
    <button class="filter-btn" onclick="setFilter('bs',this)">⚾ 야구</button>
    <button class="filter-btn" onclick="setFilter('sc',this)">⚽ 축구</button>
    <button class="filter-btn" onclick="setFilter('bk',this)">🏀 농구</button>
    <button class="filter-btn" onclick="setFilter('vl',this)">🏐 배구</button>
    <div class="wr-range">
      <span>승률</span>
      <input type="range" id="wr-min" min="0" max="100" value="0" step="5" oninput="updateWRFilter()">
      <span id="wr-min-val">0%</span>
      <span>~</span>
      <input type="range" id="wr-max" min="0" max="100" value="100" step="5" oninput="updateWRFilter()">
      <span id="wr-max-val">100%</span>
    </div>
    <select id="sort-sel" onchange="renderGames()">
      <option value="time">시간순</option>
      <option value="wr">승률순</option>
    </select>
    <button class="reload-btn" onclick="loadData()">🔄 새로고침</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">전체 경기</div><div class="stat-value" id="s-total">-</div></div>
    <div class="stat"><div class="stat-label" id="s-filtered-label">55% 이상 경기</div><div class="stat-value green" id="s-filtered">-</div></div>
    <div class="stat"><div class="stat-label">내 배당</div><div class="stat-value" id="s-myodds">-</div></div>
  </div>

  <div class="ai-status" id="ai-status">
    <span class="spinner-sm"></span> 팀 승률을 조회하고 있습니다...
  </div>

  <div id="game-list" class="game-list">
    <div class="loading-wrap"><span class="spinner"></span>경기 데이터 불러오는 중...</div>
  </div>
</div>

<!-- 상세 전적 팝업 -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">전적</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-tabs" style="display:flex;border-bottom:1px solid #f0f0ec;padding:0 8px;gap:4px;">
      <div class="modal-tab active" id="tab-home" onclick="switchTab('home')" style="flex:1">홈팀</div>
      <button id="btn-record-home" onclick="openWisetotoRecord('home')"
        style="font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid #ddd;background:#f8f8f6;cursor:pointer;color:#888;margin:auto 0">
        📋 홈전적
      </button>
      <div class="modal-tab" id="tab-away" onclick="switchTab('away')" style="flex:1">원정팀</div>
      <button id="btn-record-away" onclick="openWisetotoRecord('away')"
        style="font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid #ddd;background:#f8f8f6;cursor:pointer;color:#888;margin:auto 0">
        📋 원정전적
      </button>
    </div>
    <div class="modal-body" id="modal-body">
      <div class="record-loading"><span class="spinner"></span> 전적 불러오는 중...</div>
    </div>
  </div>
</div>

<!-- 맨 위로 버튼 -->
<button id="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})"
  style="position:fixed;bottom:90px;right:20px;width:44px;height:44px;border-radius:50%;
         background:#1a1a1a;color:#fff;border:none;font-size:18px;cursor:pointer;
         display:none;z-index:99;box-shadow:0 2px 8px rgba(0,0,0,0.3);line-height:1">↑</button>

<!-- 배당 조합 패널 -->
<div class="combo-panel" id="combo-panel">
  <div class="combo-inner">
    <div class="combo-items" id="combo-items"></div>
    <div class="combo-result"><span>조합 배당</span><span id="combo-total">-</span></div>
    <button class="combo-clear" onclick="clearCombo()">초기화</button>
  </div>
</div>

<script>
const API = '';
const SPORT_LABEL = { bs: '야구', sc: '축구', bk: '농구', vl: '배구' };

let allGames = [];
let winRateDB = {};
let normalizedMap = {};
let currentFilter = 'all';
let wrMin = 0;
let wrMax = 100;
let selectedOdds = [];
let recordCache = {};
let teamData = {}; // 팀 상세 데이터 (홈/원정 승률, 폼)
let currentModal = null; // 현재 팝업 경기

// 팀명 매핑
const TEAM_MAP = {
  // MLB
  'LA다저스':'LA 다저스','LA다저':'LA 다저스',
  '필라필리':'필라델피아 필리스','필라필':'필라델피아 필리스',
  '뉴욕양키':'뉴욕 양키스','뉴욕양':'뉴욕 양키스',
  '애슬레틱':'오클랜드 애슬레틱스','애슬레':'오클랜드 애슬레틱스',
  '탬파레이':'탬파베이 레이스','탬파레':'탬파베이 레이스',
  '뉴욕메츠':'뉴욕 메츠','뉴욕메':'뉴욕 메츠',
  '마이말린':'마이애미 말린스','마이말':'마이애미 말린스',
  'LA에인절':'LA 에인절스','LA에인':'LA 에인절스',
  '시카컵스':'시카고 컵스','시카컵':'시카고 컵스',
  '애틀브레':'애틀란타 브레이브스','애틀브':'애틀란타 브레이브스',
  '샌프자이':'샌프란시스코 자이언츠','샌프자':'샌프란시스코 자이언츠',
  '휴스애스':'휴스턴 애스트로스','휴스애':'휴스턴 애스트로스',
  '텍사레인':'텍사스 레인저스','텍사레':'텍사스 레인저스',
  '미네트윈':'미네소타 트윈스','미네트':'미네소타 트윈스',
  '시카화이':'시카고 화이트삭스','시카화':'시카고 화이트삭스',
  '캔자로얄':'캔자스시티 로열스','캔자로':'캔자스시티 로열스',
  '신시레즈':'신시내티 레즈','신시레':'신시내티 레즈',
  '밀워브루':'밀워키 브루어스','밀워브':'밀워키 브루어스',
  '워싱내셔':'워싱턴 내셔널스','워싱내':'워싱턴 내셔널스',
  '볼티오리':'볼티모어 오리올스','볼티오':'볼티모어 오리올스',
  '콜로로키':'콜로라도 로키스','콜로로':'콜로라도 로키스',
  '샌디파드':'샌디에이고 파드리스','샌디파':'샌디에이고 파드리스',
  '애리다이':'애리조나 다이아몬드백스','애리다':'애리조나 다이아몬드백스',
  '시애매리':'시애틀 매리너스','시애매':'시애틀 매리너스',
  '피츠파이':'피츠버그 파이어리츠','피츠파':'피츠버그 파이어리츠',
  '토론블루':'토론토 블루제이스','토론블':'토론토 블루제이스',
  '보스레드':'보스턴 레드삭스','보스레':'보스턴 레드삭스',
  '클리가디':'클리블랜드 가디언스','클리가':'클리블랜드 가디언스',
  '디트타이':'디트로이트 타이거스','디트타':'디트로이트 타이거스',
  '세인카디':'세인트루이스 카디널스','세인카':'세인트루이스 카디널스',
  // KBO
  'KIA':'KIA 타이거즈','LG':'LG 트윈스','SSG':'SSG 랜더스',
  'KT':'KT 위즈','NC':'NC 다이노스',
  '두산':'두산 베어스','롯데':'롯데 자이언츠',
  '삼성':'삼성 라이온즈','키움':'키움 히어로즈','한화':'한화 이글스',
  // NPB
  '야쿠르트':'도쿄 야쿠르트 스왈로스','한신':'한신 타이거즈',
  '요미우리':'요미우리 자이언츠','요코베이':'요코하마 DeNA 베이스타즈',
  '히로카프':'히로시마 도요 카프','주니치':'주니치 드래곤스',

function normalizeKey(n) { return n.replace(/\s+/g,'').toLowerCase(); }

function getTeamData(name) {
  if (!name) return null;
  // 직접 매핑
  const mapped = TEAM_MAP[name] || TEAM_MAP[name.slice(0,4)] || TEAM_MAP[name.slice(0,3)];
  const lookupName = mapped || name;
  if (teamData[lookupName]) return teamData[lookupName];
  // 정규화 맵에서 찾기
  const nk = normalizeKey(lookupName);
  const nm = normalizedMap[nk] || normalizedMap[nk.slice(0,4)] || normalizedMap[nk.slice(0,3)];
  if (nm) return teamData[nm.name] || nm;
  return null;
}

function getWRByGame(g, side) {
  // 국가대항전은 전적 캐시 우선
  const isIntl = ['남축INTL','INTL','남축올','친축','AFC','J23'].some(k => (g.league||'').includes(k));
  if (isIntl) {
    const rec = getRecordWR(g, side);
    if (rec !== null) return rec;
  }
  return getWR(side === 'home' ? g.home : g.away);
}

function getWR(name) {
  if (!name) return null;
  const mapped = TEAM_MAP[name] || TEAM_MAP[name.slice(0,4)] || TEAM_MAP[name.slice(0,3)];
  if (mapped && winRateDB[mapped] !== undefined) return winRateDB[mapped];
  if (winRateDB[name] !== undefined) return winRateDB[name];
  const nk = normalizeKey(name);
  if (normalizedMap[nk] !== undefined) return normalizedMap[nk];
  if (normalizedMap[nk.slice(0,4)] !== undefined) return normalizedMap[nk.slice(0,4)];
  if (normalizedMap[nk.slice(0,3)] !== undefined) return normalizedMap[nk.slice(0,3)];
  for (const [k,v] of Object.entries(normalizedMap)) {
    if (k.length > 3 && (k.includes(nk.slice(0,3)) || nk.includes(k.slice(0,3)))) return v;
  }
  return null;
}

  try {
    const res = await fetch(`${API}/api/proto?game_round=${round}&game_year=2026`);

    const html = await res.text();

async function fetchWinRates() {
  try {
    const res = await fetch(`${API}/api/winrates`);

// 팀 전적 기반 승률 조회 (국가대항전 등)
async function fetchTeamRecords() {
  const intlGames = allGames.filter(g =>
    g.homeSeq && g.awaySeq && g.gameDate &&
    ['남축INTL','INTL','남축올','친축','AFC','J23'].some(k => (g.league||'').includes(k))
  );
  if (intlGames.length === 0) return;

  setAiStatus('loading', '국가대항전 전적 조회중...');

  const promises = intlGames.map(async g => {
    const cacheKey = `${g.homeSeq}_${g.awaySeq}`;
    if (recordCache[cacheKey]) return;
    try {
      const [homeRes, awayRes] = await Promise.all([
        fetch(`${API}/api/teamrecord?home_seq=${g.homeSeq}&away_seq=${g.awaySeq}&game_date=${encodeURIComponent(g.gameDate)}&target=h`),
        fetch(`${API}/api/teamrecord?home_seq=${g.homeSeq}&away_seq=${g.awaySeq}&game_date=${encodeURIComponent(g.gameDate)}&target=a`),
      ]);
      const homeData = await homeRes.json();
      const awayData = await awayRes.json();
      recordCache[cacheKey] = { home: homeData.winRate, away: awayData.winRate };
    } catch(e) {}
  });
  await Promise.all(promises);
  setAiStatus('done', `✅ 승률 조회 완료`);
}

function getRecordWR(g, side) {
  if (!g.homeSeq || !g.awaySeq) return null;
  const key = `${g.homeSeq}_${g.awaySeq}`;
  return recordCache[key]?.[side] ?? null;
}

function setAiStatus(type, msg) {

  el.className = 'ai-status' + (type==='done'?' done':type==='error'?' error':'');

}

function parseGames(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const uls = doc.querySelectorAll('.gameinfo ul');
  const games = [];
  uls.forEach(ul => {
    const no    = ul.querySelector('.a1')?.textContent.trim();
    const time  = ul.querySelector('.a2')?.textContent.trim();
    const a3el  = ul.querySelector('[class*="a3"]');
    const league = ul.querySelector('.a4')?.textContent.trim();
    const d1 = ul.querySelector('.d1');
    const d5 = ul.querySelector('.d5');
    const hmText = ul.querySelector('.hm')?.textContent.trim();
    const unText = ul.querySelector('.un')?.textContent.trim();
    const hmSpan = ul.querySelector('.hm span');
    if (d1 || d5 || hmSpan) return;
    if (hmText && hmText.length > 0) return;
    if (unText && unText.length > 0) return;
    const home = ul.querySelector('.a6 .tn')?.textContent.trim();
    const away = ul.querySelector('.a8 .tn, .a8 .tnb')?.textContent.trim();
    const odds = [...ul.querySelectorAll('.a9 .pt')].map(e => e.textContent.trim());

    // 팀 ID 추출: onclick="tr('homeSeq','awaySeq','날짜','h')"
    const trMatch = ul.querySelector('.a6 .tn, .a6 .tnb')?.getAttribute('onclick')?.match(/tr\('(\d+)','(\d+)','([^']+)'/);
    const homeSeq = trMatch ? trMatch[1] : null;
    const awaySeq = trMatch ? trMatch[2] : null;
    const gameDate = trMatch ? trMatch[3] : null;
    if (!no || !home || !away) return;
    const statusText = ul.querySelector('.tag')?.textContent.trim() || '';
    if (statusText !== '경기전') return;
    const sport = a3el ? [...a3el.classList].find(c => ['bs','sc','bk','vl'].includes(c)) || 'bs' : 'bs';
    let win, draw, lose;
    if (odds.length === 2) { win=odds[0]; draw='-'; lose=odds[1]; }
    else { win=odds[0]||'-'; draw=odds[1]||'-'; lose=odds[2]||'-'; }
    games.push({
      no, time, sport, league,
      home: home.replace(/\s*\d+\s*$/,'').trim(),
      away: away.replace(/^\s*\d+\s*/,'').trim(),
      odds: { win, draw, lose },
      homeSeq, awaySeq, gameDate,
    });
  });
  const seen = new Set();
  return games.filter(g => {
    const key = `${g.home}|${g.away}|${g.time}`;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function renderGames() {
  const filtered = allGames.filter(g => currentFilter==='all' || g.sport===currentFilter);
  const withWR = filtered.map(g => ({...g, homeWR:getWRByGame(g,"home"), awayWR:getWRByGame(g,"away")}));
  // 슬라이더 범위가 기본값이면 55% 기준, 아니면 슬라이더 범위 적용
  const minThreshold = (wrMin === 0 && wrMax === 100) ? 0.55 : wrMin / 100;
  const maxThreshold = (wrMin === 0 && wrMax === 100) ? 1.0  : wrMax / 100;
  const qualified = withWR.filter(g =>
    (g.homeWR!==null && g.homeWR>=minThreshold && g.homeWR<=maxThreshold) ||
    (g.awayWR!==null && g.awayWR>=minThreshold && g.awayWR<=maxThreshold)
  );
  const display = (wrMin===0 && wrMax===100) ? withWR :
    withWR.filter(g => {
      const hw = g.homeWR!==null ? g.homeWR*100 : null;
      const aw = g.awayWR!==null ? g.awayWR*100 : null;
      return (hw!==null && hw>=wrMin && hw<=wrMax) || (aw!==null && aw>=wrMin && aw<=wrMax);
    });

  document.getElementById('s-total').textContent = filtered.length;
  document.getElementById('s-filtered').textContent = qualified.length;

  const sortBy = document.getElementById('sort-sel')?.value || 'time';
  display.sort((a,b) => {
    if (sortBy==='wr') return Math.max(b.homeWR||0,b.awayWR||0) - Math.max(a.homeWR||0,a.awayWR||0);
    return (a.time||'').replace(/[^0-9:]/g,'').localeCompare((b.time||'').replace(/[^0-9:]/g,''));
  });

  if (!display.length) {
    document.getElementById('game-list').innerHTML = '<div class="empty-wrap">조건에 맞는 경기가 없습니다.</div>';
    return;
  }

  document.getElementById('game-list').innerHTML = display.map(g => {
    const hh = g.homeWR!==null && g.homeWR>=0.55;
    const ah = g.awayWR!==null && g.awayWR>=0.55;
    const wrLoading = g.homeWR===null && g.awayWR===null;
    const homeWRText = g.homeWR!==null ? `${(g.homeWR*100).toFixed(1)}%` : '조회중...';
    const awayWRText = g.awayWR!==null ? `${(g.awayWR*100).toFixed(1)}%` : '조회중...';
    const homeWRPct = g.homeWR!==null ? g.homeWR*100 : 50;
    const awayWRPct = g.awayWR!==null ? g.awayWR*100 : 50;
    const selWin  = selectedOdds.find(o => o.gameNo===g.no && o.label==='홈승');
    const selDraw = selectedOdds.find(o => o.gameNo===g.no && o.label==='무');
    const selLose = selectedOdds.find(o => o.gameNo===g.no && o.label==='원정승');
    return `
    <div class="game-card" style="cursor:pointer" onclick="openModal('${g.no}')">
      <div class="game-meta">
        <span class="sport-tag sport-${g.sport}">${SPORT_LABEL[g.sport]||g.sport}</span>
        <span class="game-time">⏰ ${g.time}</span>
        <span class="league">${g.league} #${g.no}</span>
      </div>
      <div class="matchup">
        <div class="team">
          <div class="team-name">${hh?'<span class="high-tag">▲</span>':''}${g.home}</div>
          <div class="win-rate ${hh?'high':wrLoading?'loading':''}">${homeWRText}</div>
          <div class="wr-bar"><div class="wr-fill ${hh?'high':''}" style="width:${homeWRPct}%"></div></div>
        </div>
        <div class="vs">VS</div>
        <div class="team team-away">
          <div class="team-name">${g.away}${ah?'<span class="high-tag">▲</span>':''}</div>
          <div class="win-rate ${ah?'high':wrLoading?'loading':''}">${awayWRText}</div>
          <div class="wr-bar"><div class="wr-fill ${ah?'high':''}" style="width:${awayWRPct}%"></div></div>
        </div>
      </div>
      <div class="odds">
        <div class="odd ${selWin?'selected':''} ${g.odds.win==='-'?'disabled':''}"
             onclick="event.stopPropagation();clickOdd('${g.no}','홈승','${g.odds.win}','${g.home}')">
          <div class="odd-label">홈승</div>
          <div class="odd-value ${g.odds.win==='-'?'dash':''}">${g.odds.win}</div>
        </div>
        <div class="odd ${selDraw?'selected':''} ${g.odds.draw==='-'?'disabled':''}"
             onclick="event.stopPropagation();clickOdd('${g.no}','무','${g.odds.draw}','무승부')">
          <div class="odd-label">무</div>
          <div class="odd-value ${g.odds.draw==='-'?'dash':''}">${g.odds.draw}</div>
        </div>
        <div class="odd ${selLose?'selected':''} ${g.odds.lose==='-'?'disabled':''}"
             onclick="event.stopPropagation();clickOdd('${g.no}','원정승','${g.odds.lose}','${g.away}')">
          <div class="odd-label">원정승</div>
          <div class="odd-value ${g.odds.lose==='-'?'dash':''}">${g.odds.lose}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function parseRecordHTML(html, target) {
  const rawResults = [];
  // li 태그 파싱
  const liRegex = /<li[^>]*>([\s\S]*?)<\/li>/gi;
  const liItems = [];
  let liMatch;
  while ((liMatch = liRegex.exec(html)) !== null) {
    const text = liMatch[1].replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();
    liItems.push(text);
  }

  for (let i = 0; i < liItems.length; i++) {
    const item = liItems[i];
    if (!/^\d{4}\.\d{2}\.\d{2}/.test(item)) continue;

    const nextItem = liItems[i + 1] || '';
    const resultMatch = nextItem.match(/홈승|홈패|홈무|원정승|원정패|원정무/);
    if (!resultMatch) continue;

    const resultRaw = resultMatch[0];
    let result = '-';
    if (target === 'h') {
      if (resultRaw === '홈승') result = '승';
      else if (resultRaw === '홈무') result = '무';
      else if (resultRaw === '홈패') result = '패';
    } else {
      if (resultRaw === '원정승') result = '승';
      else if (resultRaw === '원정무') result = '무';
      else if (resultRaw === '원정패') result = '패';
    }
    if (result === '-') continue;

    // 날짜, 리그 파싱
    const parts = item.split('|');
    const dateLeague = parts[0] || '';
    const dateMatch = dateLeague.match(/(\d{4}\.\d{2}\.\d{2})/);
    const leagueMatch = dateLeague.match(/\d{2}\.\d{2}\([월화수목금토일]\)\s+[\d:]+\s+(.+)/);

    rawResults.push({
      date: dateMatch ? dateMatch[1].slice(5) : '',
      league: leagueMatch ? leagueMatch[1].trim() : '',
      home: (parts[1] || '').replace(/\*\*/g,'').replace(/\d+\s*$/,'').trim(),
      score: '',
      away: (parts[3] || '').replace(/\*\*/g,'').replace(/^\s*\d+/,'').trim(),
      result,
    });

    if (rawResults.length >= 10) break;
  }

  const wins   = rawResults.filter(r => r.result === '승').length;
  const draws  = rawResults.filter(r => r.result === '무').length;
  const losses = rawResults.filter(r => r.result === '패').length;
  const total  = wins + draws + losses;
  return { wins, draws, losses, total, winRate: total > 0 ? parseFloat((wins/total).toFixed(3)) : null, rawResults };
}

function clickOdd(gameNo, label, odd, team) {
  if (!odd || odd === '-') return;
  const key = gameNo + '_' + label;
  const existIdx = selectedOdds.findIndex(o => o.key === key);
  const sameGame = selectedOdds.findIndex(o => o.gameNo === gameNo);
  if (existIdx >= 0) {
    selectedOdds.splice(existIdx, 1);
  } else {
    if (sameGame >= 0) selectedOdds.splice(sameGame, 1);
    selectedOdds.push({ key, gameNo, label, odd: parseFloat(odd), team });
  }
  updateCombo();
  renderGames();
}

function updateCombo() {
  const panel = document.getElementById('combo-panel');
  const itemsEl = document.getElementById('combo-items');
  const totalEl = document.getElementById('combo-total');
  const myEl = document.getElementById('s-myodds');

  if (selectedOdds.length === 0) {
    panel.classList.remove('show');
    myEl.textContent = '-';
    return;
  }
  panel.classList.add('show');
  const total = selectedOdds.reduce((acc, o) => acc * o.odd, 1);
  const totalStr = total.toFixed(2) + '배';
  totalEl.textContent = totalStr;
  myEl.textContent = totalStr;

  itemsEl.innerHTML = selectedOdds.map(o =>
    `<div class="combo-item">
      <span>${o.team} ${o.label} <strong>${o.odd}배</strong></span>
      <button onclick="clickOdd('${o.gameNo}','${o.label}','${o.odd}','${o.team}')">×</button>
    </div>`
  ).join('');
}

async function openModal(gameNo) {

  if (!g) return;
  currentModal = g;

  document.getElementById('modal-title').textContent = `${g.home} vs ${g.away}`;
  document.getElementById('modal-overlay').classList.add('show');
  document.getElementById('tab-home').textContent = g.home;
  document.getElementById('tab-away').textContent = g.away;
  document.getElementById('btn-record-home').title = `${g.home} 전적 보기`;
  document.getElementById('btn-record-away').title = `${g.away} 전적 보기`;
  document.getElementById('tab-home').classList.add('active');
  document.getElementById('tab-away').classList.remove('active');
  document.getElementById('tab-home').onclick = () => switchTab('home');
  document.getElementById('tab-away').onclick = () => switchTab('away');

  await loadRecord(g, 'home');
}

function openWisetotoRecord(side) {
  if (!currentModal) return;
  const g = currentModal;
  const target = side === 'away' ? 'a' : 'h';
  if (g.homeSeq && g.awaySeq) {
    const url = `https://www.wisetoto.com/gameinfo/team_record.htm?game_category=pt1&home_team_info_seq=${g.homeSeq}&away_team_info_seq=${g.awaySeq}&game_date=${encodeURIComponent(g.gameDate)}&target=${target}&type=all&list_num=10`;
    window.open(url, '_blank');
  } else {
    window.open(`https://www.wisetoto.com/index.htm?tab_type=proto&game_type=pt&game_category=pt1`, '_blank');
  }
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('show');
  currentModal = null;
}

async function switchTab(side) {
  document.getElementById('tab-home').classList.toggle('active', side === 'home');
  document.getElementById('tab-away').classList.toggle('active', side === 'away');
  if (currentModal) await loadRecord(currentModal, side);
}

async function loadRecord(g, side) {
  document.getElementById('modal-body').innerHTML = '<div class="record-loading"><span class="spinner"></span> 최근 전적 검색중...</div>';
  const teamName = side === 'home' ? g.home : g.away;
  const td = getTeamData(teamName);

  const data = {
    winRate: td?.winRate ?? null,
    homeWR: td?.homeWR ?? null,
    awayWR: td?.awayWR ?? null,
    form: td?.form ?? null,
    streak: td?.streak ?? null,
  };

  // 과거 회차 데이터로 최근 10경기 승패 조회 (먼저 실행)
  let rawResults = [];
  let recentRecord = null;
  try {
    const round = document.getElementById('round-sel')?.value || '65';
    const recRes = await fetch(`${API}/api/teamrecord?team=${encodeURIComponent(teamName)}&current_round=${round}`);
    recentRecord = await recRes.json();
    if (recentRecord.total > 0 && recentRecord.streak) {
      data.streak = recentRecord.streak;
    }
  } catch(e) {}

  const wr = data.winRate !== null ? (data.winRate * 100).toFixed(1) + '%' : '-';
  const homeWRText = data.homeWR !== null ? (data.homeWR*100).toFixed(1)+'%' : '-';
  const awayWRText = data.awayWR !== null ? (data.awayWR*100).toFixed(1)+'%' : '-';

  // 최근 경기 요약
  const recentSummary = recentRecord && recentRecord.total > 0
    ? `최근 ${recentRecord.total}경기 ${recentRecord.wins}승 ${recentRecord.draws}무 ${recentRecord.losses}패 (${recentRecord.winRate !== null ? (recentRecord.winRate*100).toFixed(1)+'%' : '-'})`
    : null;

  // 연속 결과
  let streakHTML = '-';
  if (data.streak) {
    const type = data.streak[0];
    const num  = data.streak.slice(1);
    const color = type === 'W' ? '#1a7a47' : '#e53935';
    const label = type === 'W' ? `${num}연승` : `${num}연패`;
    streakHTML = `<span style="color:${color};font-weight:600">${label}</span>`;
  }

  // 최근 폼 원형 배지
  const formHTML = data.form && data.form.length > 0
    ? data.form.map(r => `<span style="display:inline-block;width:28px;height:28px;line-height:28px;text-align:center;border-radius:50%;font-size:12px;font-weight:600;margin:2px;background:${r==='승'?'#e8f4ee':r==='무'?'#f5f5f0':'#fde8e8'};color:${r==='승'?'#1a7a47':r==='무'?'#888':'#e53935'}">${r}</span>`).join('')
    : '<span style="color:#aaa;font-size:13px">데이터 없음</span>';

  // 홈/원정 승률 있는 경우만 표시
  const wrCards = [
    `<div class="record-stat"><div class="record-stat-label">시즌 승률</div><div class="record-stat-value green">${wr}</div></div>`,
    data.homeWR !== null ? `<div class="record-stat"><div class="record-stat-label">홈 승률</div><div class="record-stat-value">${homeWRText}</div></div>` : '',
    data.awayWR !== null ? `<div class="record-stat"><div class="record-stat-label">원정 승률</div><div class="record-stat-value">${awayWRText}</div></div>` : '',
    `<div class="record-stat"><div class="record-stat-label">연속</div><div class="record-stat-value" style="font-size:16px">${streakHTML}</div></div>`,
  ].filter(Boolean).join('');

  // 승/무/패 (무가 없는 종목은 2칸으로)
  const hasDraw = data.draws !== null && data.draws !== undefined;
  const winsVal = recentRecord?.wins ?? data.wins;
  const drawsVal = recentRecord?.draws ?? data.draws;
  const lossesVal = recentRecord?.losses ?? data.losses;
  const wdlGrid = hasDraw
    ? `grid-template-columns:1fr 1fr 1fr`
    : `grid-template-columns:1fr 1fr`;

  const wdlCards = `
    <div style="text-align:center;background:#f8f8f6;border-radius:8px;padding:8px;">
      <div style="font-size:11px;color:#888;margin-bottom:4px;">승</div>
      <div style="font-size:20px;font-weight:600;color:#1a7a47">${winsVal ?? '-'}</div>
    </div>
    ${hasDraw ? `<div style="text-align:center;background:#f8f8f6;border-radius:8px;padding:8px;">
      <div style="font-size:11px;color:#888;margin-bottom:4px;">무</div>
      <div style="font-size:20px;font-weight:600">${drawsVal ?? '-'}</div>
    </div>` : ''}
    <div style="text-align:center;background:#f8f8f6;border-radius:8px;padding:8px;">
      <div style="font-size:11px;color:#888;margin-bottom:4px;">패</div>
      <div style="font-size:20px;font-weight:600;color:#e53935">${lossesVal ?? '-'}</div>
    </div>`;

  document.getElementById('modal-body').innerHTML = `
    <div class="record-summary" style="grid-template-columns:repeat(${data.homeWR!==null&&data.awayWR!==null?4:data.homeWR!==null||data.awayWR!==null?3:2},1fr)">
      ${wrCards}
    </div>
    <div style="display:grid;${wdlGrid};gap:8px;margin-top:1rem;">
      ${wdlCards}
    </div>
    <div style="margin-top:1rem;">
      <div style="font-size:12px;color:#888;margin-bottom:8px;">최근 폼</div>
      <div>${formHTML}</div>
    </div>
    ${recentSummary ? `
    <div style="margin-top:0.8rem;padding:8px 12px;background:#f8f8f6;border-radius:8px;font-size:13px;color:#444;">
      📊 ${recentSummary}
    </div>` : ''}
    ${rawResults.length > 0 ? `
    <div style="margin-top:1rem;">
      <div style="font-size:12px;color:#888;margin-bottom:8px;">최근 ${rawResults.length}경기 전적</div>
      ${rawResults.map(r => `
        <div style="display:flex;align-items:center;gap:6px;font-size:12px;padding:5px 6px;border-radius:6px;background:#f8f8f6;margin-bottom:4px;">
          <span style="color:#aaa;min-width:36px">${r.date}</span>
          <span style="flex:1">${r.home||''} <span style="color:#888">${r.score||''}</span> ${r.away||''}</span>
          <span style="font-size:10px;color:#aaa">${r.home===teamName?'홈':'원정'}</span>
          <span style="padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;background:${r.result==='승'?'#e8f4ee':r.result==='무'?'#f5f5f0':'#fde8e8'};color:${r.result==='승'?'#1a7a47':r.result==='무'?'#888':'#e53935'}">${r.result}</span>
        </div>`).join('')}
    </div>` : ''}`;
}

function clearCombo() {
  selectedOdds = [];
  updateCombo();
  renderGames();
}

initRounds().then(() => loadData());
</script>
</body>
</html>
